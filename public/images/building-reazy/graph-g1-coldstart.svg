<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-label="Request latency: three fast paths in milliseconds versus a cold start of 40 to 45 seconds on a broken axis">
  <style>
    text{font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
    .lbl{font-size:13px;fill:#f4f4f5} .val{font-size:12px;fill:#aab2bf} .ann{font-size:11.5px;fill:#aab2bf}
  </style>

  <!-- row labels -->
  <text class="lbl" x="150" y="60"  text-anchor="end">cache hit</text>
  <text class="lbl" x="150" y="116" text-anchor="end">warm synthesis</text>
  <text class="lbl" x="150" y="172" text-anchor="end">cache miss</text>
  <text class="lbl" x="150" y="236" text-anchor="end">cold start</text>

  <!-- fast bars (ms scale: 1.275 px/ms from x=165) -->
  <rect x="165" y="41"  width="15"  height="30" rx="3" fill="#6cb796"/>
  <text class="val" x="190" y="60">5–20 ms</text>

  <rect x="165" y="97"  width="127" height="30" rx="3" fill="#7aa7ff"/>
  <text class="val" x="300" y="116">~100 ms</text>

  <rect x="165" y="153" width="210" height="30" rx="3" fill="#d6ad5b"/>
  <text class="val" x="383" y="172">130–200 ms</text>

  <!-- cold-start callout -->
  <text x="470" y="208" text-anchor="middle" style="font-size:12px;font-weight:600;fill:#f87171">the cold-start cliff — ≈ 400× a warm request</text>

  <!-- cold-start bar (off a broken axis) -->
  <rect x="165" y="217" width="555" height="30" rx="3" fill="#f87171"/>
  <!-- axis-break glyph -->
  <rect x="438" y="215" width="16" height="34" fill="#0C0C0C"/>
  <line x1="437" y1="249" x2="450" y2="215" stroke="#aab2bf" stroke-width="2"/>
  <line x1="443" y1="249" x2="456" y2="215" stroke="#aab2bf" stroke-width="2"/>
  <text x="712" y="237" text-anchor="end" style="font-size:12.5px;font-weight:700;fill:#0C0C0C">~42,500 ms · 40–45 s</text>

  <!-- fast-region axis -->
  <line x1="165" y1="262" x2="420" y2="262" stroke="#3a3f47"/>
  <line x1="165" y1="262" x2="165" y2="266" stroke="#3a3f47"/>
  <line x1="292" y1="262" x2="292" y2="266" stroke="#3a3f47"/>
  <line x1="420" y1="262" x2="420" y2="266" stroke="#3a3f47"/>
  <text class="val" x="165" y="280" text-anchor="middle">0</text>
  <text class="val" x="292" y="280" text-anchor="middle">100</text>
  <text class="val" x="420" y="280" text-anchor="middle">200</text>
  <text class="ann" x="455" y="280">milliseconds — axis breaks, then jumps to seconds</text>
</svg>
